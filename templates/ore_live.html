<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101828">
  <title>Ore Live</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="app">
    <section class="hero card">
      <div class="top">
        <div>
          <div class="hello">👷 Gabriele</div>
          <div class="title">Dashboard lavoro</div>
        </div>
        <div id="badge" class="badge">Caricamento</div>
      </div>

      <div id="timer" class="timer">00:00:00</div>
      <div id="sub" class="sub">Controllo stato...</div>

      <div class="mini-row">
        <div>
          <div class="label">Inizio lavoro</div>
          <div id="start" class="strong">--:--</div>
        </div>
        <div>
          <div class="label">Entrata oggi</div>
          <div id="entry" class="strong">--:--</div>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="box">
        <div class="icon">⏱</div>
        <div>
          <div class="label">Sessione attuale</div>
          <div id="liveHuman" class="value">0 h 00 min</div>
        </div>
      </div>

      <div class="box">
        <div class="icon">📅</div>
        <div>
          <div class="label">Ore oggi</div>
          <div id="today" class="value">0 h 00 min</div>
        </div>
      </div>

      <div class="box">
        <div class="icon">📆</div>
        <div>
          <div class="label">Ore settimana</div>
          <div id="week" class="value">0 h 00 min</div>
        </div>
      </div>

      <div class="box">
        <div class="icon">🗓</div>
        <div>
          <div class="label">Ore mese</div>
          <div id="month" class="value">0 h 00 min</div>
        </div>
      </div>
    </section>

    <section class="card works-card">
      <div class="section-head">
        <div>
          <div class="section-title">Lavori oggi</div>
          <div id="worksCount" class="section-sub">0 registrati</div>
        </div>
        <div class="small-pill" id="exitToday">Uscita --:--</div>
      </div>

      <div id="worksList" class="works-list">
        <div class="empty">Nessun lavoro registrato oggi</div>
      </div>
    </section>

    <button class="btn" onclick="loadStatus(true)">Aggiorna</button>
    <div id="updated" class="footer"></div>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
