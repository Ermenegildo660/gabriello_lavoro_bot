<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ore Live</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="top">
        <div>
          <div class="title">Ore Live</div>
          <div class="subtitle">Gabriello Lavoro Bot</div>
        </div>
        <div id="badge" class="badge">Caricamento</div>
      </div>

      <div id="timer" class="timer">00:00:00</div>
      <div id="sub" class="sub">Controllo stato...</div>

      <div class="grid">
        <div class="box">
          <div class="label">Inizio lavoro</div>
          <div id="start" class="value">--:--:--</div>
        </div>
        <div class="box">
          <div class="label">Ore live</div>
          <div id="decimal" class="value">0.00 h</div>
        </div>
        <div class="box">
          <div class="label">Ore oggi</div>
          <div id="today" class="value">0.00 h</div>
        </div>
        <div class="box">
          <div class="label">Lavori oggi</div>
          <div id="works" class="value">0</div>
        </div>
      </div>

      <div class="last">
        <div class="label">Ultimo lavoro registrato</div>
        <div id="lastWork" class="last-value">—</div>
      </div>

      <button class="btn" onclick="loadStatus()">Aggiorna</button>
      <div id="updated" class="footer"></div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
